<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EOL Folding Parameter Management</title>
  <style>
    body {
      font-family: 'Malgun Gothic', 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      color: #333;
    }
    .container {
      max-width: 1000px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .header {
      text-align: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid #4a4a4a;
    }
    .header h1 {
      font-size: 22px;
      color: #2c3e50;
      margin: 0 0 5px 0;
    }
    .header p {
      font-size: 13px;
      color: #7f8c8d;
      margin: 0;
    }
    .tab-container {
      display: flex;
      margin-bottom: 25px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #cbd5e1;
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      background-color: #f1f5f9;
      border: none;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      color: #64748b;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background-color: #4a4a4a;
      color: white;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }
    .form-row .form-group {
      margin-bottom: 0;
    }
    
    .checkbox-group {
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      padding: 12px 15px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 10px;
      cursor: pointer;
    }
    .checkbox-group label {
      display: inline;
      margin-bottom: 0;
      cursor: pointer;
      font-size: 14px;
      color: #1e293b;
    }

    .sub-section {
      background-color: #fcfcfc;
      border: 1px dashed #cbd5e1;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    .sub-section h3 {
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 15px;
      color: #475569;
      border-left: 4px solid #4a4a4a;
      padding-left: 8px;
    }
    .dynamic-item-box {
      background-color: #ffffff;
      border: 1px solid #e2e8f0;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 15px;
      position: relative;
    }
    .remove-btn {
      position: absolute;
      top: 12px;
      right: 15px;
      background-color: #ef4444;
      color: white;
      border: none;
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    .remove-btn:hover {
      background-color: #dc2626;
    }
    .add-more-btn {
      background-color: #475569;
      color: white;
      border: none;
      padding: 8px 14px;
      font-size: 13px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 15px;
      transition: background-color 0.2s;
    }
    .add-more-btn:hover {
      background-color: #334155;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #34495e;
      font-size: 14px;
    }
    .notice-text {
      font-size: 12px;
      color: #e11d48;
      font-weight: bold;
      margin-bottom: 6px;
      display: block;
    }
    select, input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
      background-color: #fff;
      font-family: inherit;
    }
    select:focus, input:focus, textarea:focus {
      border-color: #3498db;
      outline: none;
      box-shadow: 0 0 4px rgba(52,152,219,0.3);
    }
    textarea {
      height: 80px;
      resize: vertical;
    }
    .button {
      width: 100%;
      padding: 14px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 15px;
      transition: background-color 0.2s;
    }
    .button:hover {
      background-color: #218838;
    }
    .fetch-btn {
      width: 100%;
      padding: 12px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 25px;
      transition: background-color 0.2s;
    }
    .fetch-btn:hover {
      background-color: #2980b9;
    }
    .status-msg {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
      color: #4a4a4a;
      font-size: 14px;
    }
    
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      background-color: #f8fafc;
      padding: 15px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    .filter-grid .form-group {
      margin-bottom: 0;
    }
    .filter-grid label {
      font-size: 12px;
      color: #64748b;
    }
    .filter-grid select, .filter-grid input {
      padding: 8px 10px;
      font-size: 13px;
    }

    .table-wrapper {
      overflow-x: auto;
      margin-top: 15px;
      max-height: 500px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: white;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      text-align: left;
      min-width: 1050px; 
    }
    th {
      background-color: #f8f9fa;
      color: #334155;
      font-weight: bold;
      padding: 12px 10px;
      border: 1px solid #cbd5e1;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    td {
      padding: 12px 10px;
      border: 1px solid #cbd5e1;
      word-break: keep-all; 
      word-wrap: break-word;
      vertical-align: middle;
    }
    tr:nth-child(even) {
      background-color: #fcfcfc;
    }
    
    th:nth-child(1) { width: 80px; }  
    th:nth-child(2) { width: 140px; } 
    th:nth-child(3) { width: 160px; } 
    th:nth-child(4) { width: 140px; } 
    th:nth-child(5) { width: 80px; }  
    th:nth-child(6) { width: 55px; }  
    th:nth-child(7) { width: 160px; } 
    th:nth-child(8) { width: 90px; }  
    th:nth-child(9) { width: 170px; } 
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📋 EOL Folding Parameter 관리<br><span style="font-size:16px; color:#555;">(Parameter Management System)</span></h1>
    <p>Folding 공정 파라미터 변경 이력 시스템 / Change History System</p>
  </div>

  <div class="tab-container">
    <button id="tab-input" class="tab-btn active" onclick="switchMode('input')">✍️ 파라미터 등록 (Input)</button>
    <button id="tab-view" class="tab-btn" onclick="switchMode('view')">🔍 이력 조회 (History View)</button>
  </div>

  <div id="section-input">
    <div class="form-group">
      <label for="line">1. 라인 (Line)</label>
      <select id="line">
        <option value="">-- 라인을 선택하세요 / Select Line --</option>
      </select>
    </div>

    <div class="form-group">
      <label for="unit">2. 유닛 (Unit)</label>
      <select id="unit" onchange="handleUnitChange()">
        <option value="">-- 유닛을 선택하세요 / Select Unit --</option>
        <option value="Pouch Cutter">Pouch Cutter</option>
        <option value="Heat Press1(Cutter 전)">Heat Press1(Cutter 전)</option>
        <option value="Heat Press2(90 Folding 전)">Heat Press2(90 Folding 전)</option>
        <option value="90 Folding">90 Folding</option>
        <option value="180 Folding">180 Folding</option>
        <option value="Heat Press3A(270 Folding 전)">Heat Press3A(270 Folding 전)</option>
        <option value="Heat Press3B(270 Folding 전)">Heat Press3B(270 Folding 전)</option>
        <option value="270 Folding A">270 Folding A</option>
        <option value="270 Folding B">270 Folding B</option>
        <option value="Side Press A">Side Press A</option>
        <option value="Side Press B">Side Press B</option>
        <option value="Taping Unit A">Taping Unit A</option>
        <option value="Taping Unit B">Taping Unit B</option>
        <option value="Taping Press A">Taping Press A</option>
        <option value="Taping Press B">Taping Press B</option>
      </select>
    </div>

    <div class="checkbox-group" id="common-apply-wrapper">
      <input type="checkbox" id="common-apply" />
      <label for="common-apply"><strong>🔄 A/B 공통 적용</strong> (선택 시 반대편 유닛도
