<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EOL Folding Parameter Management</title>
  <style>
    body {
      font-family: 'Malgun Gothic', 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      color: #333;
    }
    .container {
      max-width: 950px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .header {
      text-align: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid #4a4a4a;
    }
    .header h1 {
      font-size: 22px;
      color: #2c3e50;
      margin: 0 0 5px 0;
    }
    .header p {
      font-size: 13px;
      color: #7f8c8d;
      margin: 0;
    }
    .tab-container {
      display: flex;
      margin-bottom: 25px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #cbd5e1;
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      background-color: #f1f5f9;
      border: none;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      color: #64748b;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background-color: #4a4a4a;
      color: white;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }
    .form-row .form-group {
      margin-bottom: 0;
    }
    
    /* 체크박스 전용 스타일 */
    .checkbox-group {
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      padding: 12px 15px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 10px;
      cursor: pointer;
    }
    .checkbox-group label {
      display: inline;
      margin-bottom: 0;
      cursor: pointer;
      font-size: 14px;
      color: #1e293b;
    }

    .sub-section {
      background-color: #fcfcfc;
      border: 1px dashed #cbd5e1;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    .sub-section h3 {
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 15px;
      color: #475569;
      border-left: 4px solid #4a4a4a;
      padding-left: 8px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #34495e;
      font-size: 14px;
    }
    select, input[type="text"], textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
      background-color: #fff;
      font-family: inherit;
    }
    select:focus, input:focus, textarea:focus {
      border-color: #3498db;
      outline: none;
      box-shadow: 0 0 4px rgba(52,152,219,0.3);
    }
    textarea {
      height: 80px;
      resize: vertical;
    }
    .button {
      width: 100%;
      padding: 14px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 15px;
      transition: background-color 0.2s;
    }
    .button:hover {
      background-color: #218838;
    }
    .fetch-btn {
      width: 100%;
      padding: 12px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 25px;
      transition: background-color 0.2s;
    }
    .fetch-btn:hover {
      background-color: #2980b9;
    }
    .status-msg {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
      color: #4a4a4a;
      font-size: 14px;
    }
    
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      background-color: #f8fafc;
      padding: 15px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    .filter-grid .form-group {
      margin-bottom: 0;
    }
    .filter-grid label {
      font-size: 12px;
      color: #64748b;
    }
    .filter-grid select, .filter-grid input {
      padding: 8px 10px;
      font-size: 13px;
    }

    .table-wrapper {
      overflow-x: auto;
      margin-top: 15px;
      max-height: 500px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      text-align: left;
      background: white;
      table-layout: fixed;
    }
    th {
      background-color: #f8f9fa;
      color: #334155;
      font-weight: bold;
      padding: 12px 10px;
      border: 1px solid #cbd5e1;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    td {
      padding: 10px;
      border: 1px solid #cbd5e1;
      word-break: break-all;
      vertical-align: middle;
    }
    tr:nth-child(even) {
      background-color: #fcfcfc;
    }
    
    th:nth-child(1) { width: 55px; }  
    th:nth-child(2) { width: 155px; } 
    th:nth-child(3) { width: 140px; } 
    th:nth-child(4) { width: 85px; }  
    th:nth-child(5) { width: 65px; }  
    th:nth-child(6) { width: 160px; } 
    th:nth-child(7) { width: 85px; }  
    th:nth-child(8) { width: auto; }  
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📋 EOL Folding Parameter 관리<br><span style="font-size:16px; color:#555;">(Parameter Management System)</span></h1>
    <p>Folding 공정 파라미터 변경 이력 시스템 / Change History System</p>
  </div>

  <div class="tab-container">
    <button id="tab-input" class="tab-btn active" onclick="switchMode('input')">✍️ 파라미터 등록 (Input)</button>
    <button id="tab-view" class="tab-btn" onclick="switchMode('view')">🔍 이력 조회 (History View)</button>
  </div>

  <!-- ================= [1. 입력 폼 영역] ================= -->
  <div id="section-input">
    <div class="form-group">
      <label for="line">1. 라인 (Line)</label>
      <select id="line">
        <option value="">-- 라인을 선택하세요 / Select Line --</option>
      </select>
    </div>

    <div class="form-group">
      <label for="unit">2. 유닛 (Unit)</label>
<select id="unit" onchange="handleUnitChange()">
  <option value="">-- 유닛을 선택하세요 / Select Unit --</option>
  <option value="Pouch Cutter">Pouch Cutter</option>
  <option value="Heat Press1(Cutter 전)">Heat Press1(Cutter 전)</option>
  <option value="Heat Press2(90 Folding 전)">Heat Press2(90 Folding 전)</option>
  <option value="90 Folding">90 Folding</option>
  <option value="180 Folding">180 Folding</option>
  <option value="Heat Press3A(270 Folding 전)">Heat Press3A(270 Folding 전)</option>
  <option value="Heat Press3B(270 Folding 전)">Heat Press3B(270 Folding 전)</option>
  <option value="270 Folding A">270 Folding B</option>
  <option value="270 Folding B">270 Folding A</option>
  <option value="Side Press A">Side Press A</option>
  <option value="Side Press B">Side Press B</option>
  <option value="Taping Unit A">Taping Unit A</option>
  <option value="Taping Unit B">Taping Unit B</option>
  <!-- 🛠️ 추가된 항목 -->
  <option value="Taping Press A">Taping Press A</option>
  <option value="Taping Press B">Taping Press B</option>
</select>
    </div>

    <!-- 🛠️ A/B 공통 적용 체크박스 추가 -->
    <div class="checkbox-group" id="common-apply-wrapper">
      <input type="checkbox" id="common-apply" />
      <label for="common-apply"><strong>🔄 A/B 공통 적용</strong> (선택 시 반대편 유닛도 행 자동 생성 및 동시 업로드)</label>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="worker">3. 변경자 (Worker) <span style="color:#e11d48;">*필수</span></label>
        <input type="text" id="worker" placeholder="이름 입력 / Worker name" />
      </div>
      <div class="form-group">
        <label for="requester">4. 요청자 (Requester) <span style="color:#64748b; font-weight:normal;">(선택)</span></label>
        <input type="text" id="requester" placeholder="공란 가능 / Optional" />
      </div>
    </div>

    <div class="form-group">
      <label for="contentType">5. 변경 내용 (Content Type)</label>
      <select id="contentType" onchange="toggleSubFields()">
        <option value="">-- 유형을 선택하세요 / Select Type --</option>
        <option value="Temperature">Temperature (온도)</option>
        <option value="Servo Parameter">Servo Parameter (서보 파라미터)</option>
        <option value="Normal Parameter">Normal Parameter (일반 파라미터)</option>
      </select>
    </div>

    <!-- Temperature Section -->
    <div id="sec-temperature" class="sub-section">
      <h3>🌡️ Temperature 세부 정보 (Details)</h3>
      <div class="form-group">
        <label for="temp-val">변경내용1 - 온도 (Value - Temperature)</label>
        <input type="text" id="temp-val" placeholder="설정 온도를 입력하세요 / Enter temperature value" />
      </div>
      <div class="form-group">
        <label for="temp-reason">변경내용2 - 변경 사유 (Reason for Change)</label>
        <textarea id="temp-reason" placeholder="변경 사유를 입력하세요 / Enter reason for change"></textarea>
      </div>
    </div>

    <!-- Servo Parameter Section -->
    <div id="sec-servo" class="sub-section">
      <h3>⚙️ Servo Parameter 세부 정보 (Details)</h3>
      <div class="form-group">
        <label for="servo-type">변경내용 1 - 속도/위치 구분 (Speed / Position)</label>
        <select id="servo-type">
          <option value="">-- 선택 / Select --</option>
          <option value="속도">속도 (Speed)</option>
          <option value="위치">위치 (Position)</option>
        </select>
      </div>
      <div class="form-group">
        <label for="servo-axis">변경내용 2 - 축 정보 (Axis Information)</label>
        <select id="servo-axis">
          <option value="">-- 선택 / Select --</option>
          <option value="X">X</option>
          <option value="Y">Y</option>
          <option value="Z">Z</option>
        </select>
      </div>
      <div class="form-group">
        <label for="servo-part">변경내용 3 - Part 정보 (Part Details)</label>
        <select id="servo-part">
          <option value="">-- 선택 / Select --</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="servo-desc-select">변경내용 3 sub - 파라 설명 (Parameter Description)</label>
        <select id="servo-desc-select">
          <option value="">-- 선택 / Select --</option>
          <option value="대기 위치">대기 위치 (Wait Position)</option>
          <option value="상승 위치">상승 위치 (Up Position)</option>
          <option value="하강 위치">하강 위치 (Down Position)</option>
          <option value="상승 속도">상승 속도 (Up Speed)</option>
          <option value="하강 속도">하강 속도 (Down Speed)</option>
        </select>
        <input type="text" id="servo-desc-input" placeholder="파라미터 설명을 직접 입력하세요 / Enter description" style="display: none;" />
      </div>

      <div class="form-group">
        <label for="servo-val">변경내용 4 - 변경 값 (Change Value)</label>
        <input type="text" id="servo-val" placeholder="변경 수치를 입력하세요 / Enter change value" />
      </div>
      <div class="form-group">
        <label for="servo-reason">변경내용 5 - 변경 사유 (Reason for Change)</label>
        <textarea id="servo-reason" placeholder="변경 사유를 입력하세요 / Enter reason for change"></textarea>
      </div>
    </div>

    <!-- Normal Parameter Section -->
    <div id="sec-normal" class="sub-section">
      <h3>📄 Normal Parameter 세부 정보 (Details)</h3>
      <div class="form-group">
        <label for="normal-type">변경내용1 - 타입 (Parameter Type)</label>
        <select id="normal-type">
          <option value="">-- 선택 / Select --</option>
          <option value="펀치 유지 시간">펀치 유지 시간 (Punch Dwell Time)</option>
          <option value="press 유지시간">press 유지시간 (Press Holding Time)</option>
        </select>
      </div>
      <div class="form-group">
        <label for="normal-val">변경내용2 - 변경 값 (Change Value)</label>
        <input type="text" id="normal-val" placeholder="변경 값을 입력하세요 / Enter change value" />
      </div>
      <div class="form-group">
        <label for="normal-reason">변경내용3 - 변경 사유 (Reason for Change)</label>
        <textarea id="normal-reason" placeholder="변경 사유를 입력하세요 / Enter reason for change"></textarea>
      </div>
    </div>

    <button class="button" onclick="submitData()">업로드 + 자동 클립보드 복사 (Upload & Copy)</button>
  </div>

  <!-- ================= [2. 이력 조회 영역] ================= -->
  <div id="section-view" style="display: none;">
    
    <button class="fetch-btn" onclick="loadHistoryFromServer()">🔄 이력 불러오기 (Fetch Data)</button>

    <div class="filter-grid">
      <div class="form-group">
        <label>🔎 라인 필터</label>
        <select id="filter-line" onchange="renderHistoryTable()">
          <option value="">- 전체 라인 -</option>
        </select>
      </div>
      <div class="form-group">
        <label>🔎 유닛 필터</label>
<select id="filter-unit" onchange="renderHistoryTable()">
  <option value="">- 전체 유닛 -</option>
  <option value="Pouch Cutter">Pouch Cutter</option>
  <option value="Heat Press1(Cutter 전)">Heat Press1(Cutter 전)</option>
  <option value="Heat Press2(90 Folding 전)">Heat Press2(90 Folding 전)</option>
  <option value="90 Folding">90 Folding</option>
  <option value="180 Folding">180 Folding</option>
  <option value="Heat Press3A(270 Folding 전)">Heat Press3A(270 Folding 전)</option>
  <option value="Heat Press3B(270 Folding 전)">Heat Press3B(270 Folding 전)</option>
  <option value="270 Folding A">270 Folding A</option>
  <option value="270 Folding B">270 Folding B</option>
  <option value="Side Press A">Side Press A</option>
  <option value="Side Press B">Side Press B</option>
  <option value="Taping Unit A">Taping Unit A</option>
  <option value="Taping Unit B">Taping Unit B</option>
  <!-- 🛠️ 추가된 항목 -->
  <option value="Taping Press A">Taping Press A</option>
  <option value="Taping Press B">Taping Press B</option>
</select>
      </div>
      <div class="form-group">
        <label>🔎 축(Axis) 필터</label>
        <select id="filter-axis" onchange="renderHistoryTable()">
          <option value="">- 전체 축 -</option>
          <option value="X">X축</option>
          <option value="Y">Y축</option>
          <option value="Z">Z축</option>
        </select>
      </div>
      <div class="form-group">
        <label>🔎 파트 정보 검색</label>
        <input type="text" id="filter-part" oninput="renderHistoryTable()" placeholder="파트명 입력..." />
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>라인</th>
            <th>유닛</th>
            <th>변경자 (요청자)</th>
            <th>유형</th>
            <th>축</th>
            <th>파트 정보</th>
            <th>변경 값</th>
            <th>변경 사유</th>
          </tr>
        </thead>
        <tbody id="history-tbody">
          <tr>
            <td colspan="8" style="text-align: center; color: #7f8c8d; padding: 20px;">'이력 불러오기' 버튼을 눌러주세요.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="status" class="status-msg"></div>
</div>

<script>
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzTzIbltU0wgVvn-BonmlXxEjWr8IE-w_v7k42V61PEb5vWwN2VDk02mOPtpKp0sHqy/exec";

  let cachedHistoryData = []; 

  const defaultParts = [
    { value: "상도", text: "상도 (Upper Mold)" },
    { value: "하도", text: "하도 (Lower Mold)" },
    { value: "펀치", text: "펀치 (Punch)" },
    { value: "유닛 전체(얼라인)", text: "유닛 전체/얼라인 (Total Unit / Align)" }
  ];

  const tapingParts = [
    { value: "Feeding Gripper", text: "Feeding Gripper" },
    { value: "Attacher Jig", text: "Attacher Jig" },
    { value: "Cutting Knife", text: "Cutting Knife" }
  ];

  function initLineOptions() {
    const lineSelect = document.getElementById('line');
    const filterLineSelect = document.getElementById('filter-line');
    
    for (let i = 1; i <= 6; i++) {
      for (let j = 1; j <= 2; j++) {
        const val = `${i}-${j}`;
        
        const opt1 = document.createElement('option');
        opt1.value = val; opt1.textContent = val;
        lineSelect.appendChild(opt1);

        const opt2 = document.createElement('option');
        opt2.value = val; opt2.textContent = val;
        filterLineSelect.appendChild(opt2);
      }
    }
  }

  window.addEventListener('load', () => {
    initLineOptions();
    updatePartOptions(defaultParts);
    checkCommonApplyVisibility(); // 초기 체크박스 가시성 검사
  });

  function switchMode(mode) {
    document.getElementById('tab-input').classList.remove('active');
    document.getElementById('tab-view').classList.remove('active');
    document.getElementById('section-input').style.display = 'none';
    document.getElementById('section-view').style.display = 'none';
    document.getElementById('status').innerText = '';

    if (mode === 'input') {
      document.getElementById('tab-input').classList.add('active');
      document.getElementById('section-input').style.display = 'block';
    } else if (mode === 'view') {
      document.getElementById('tab-view').classList.add('active');
      document.getElementById('section-view').style.display = 'block';
    }
  }

  async function loadHistoryFromServer() {
    const tbody = document.getElementById('history-tbody');
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:20px; color:#3498db; font-weight:bold;">⏳ 데이터를 불러오는 중입니다...</td></tr>';
    
    try {
      const response = await fetch(GOOGLE_SCRIPT_URL);
      if (!response.ok) throw new Error("Network response was not ok");
      
      const data = await response.json();
      
      if (data && data.error) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:20px; color:#e74c3c;">❌ 서버 에러: ${data.error}</td></tr>`;
        return;
      }

      cachedHistoryData = data;
      renderHistoryTable();
      
    } catch(e) {
      console.error("데이터 로드 실패:", e);
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:20px; color:#e74c3c;">❌ 데이터를 가져오지 못했습니다.<br>배포 상태를 다시 확인해 주세요.</td></tr>';
    }
  }

// 1. HTML 파일 하단 <script> 태그 내부에서 이 함수를 찾으세요.
function renderHistoryTable() {
  const filterLine = document.getElementById('filter-line').value;
  const filterUnit = document.getElementById('filter-unit').value;
  const filterAxis = document.getElementById('filter-axis').value;
  const filterPart = document.getElementById('filter-part').value.trim().toLowerCase();
  
  const tbody = document.getElementById('history-tbody');
  tbody.innerHTML = '';

  if (!cachedHistoryData || cachedHistoryData.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:20px; color:#aaa;">조회된 이력 데이터가 없습니다.</td></tr>';
    return;
  }

  let filteredData = cachedHistoryData.filter(row => {
    if (row.length < 3) return false;
    
    // 💡 [이 부분을 수정했습니다] 
    // 서버에서 "1-1 2026-06-27..."처럼 넘어오는 데이터에서 첫 공백 앞의 "1-1"만 잘라내어 필터와 비교합니다.
    const rawLineVal = row[1] ? String(row[1]).trim() : '';
    const lineVal = rawLineVal.split(' ')[0]; 
    
    // 라인 필터 비교
    const matchLine = filterLine ? (lineVal === filterLine) : true;
    
    const unitVal = row[2] ? String(row[2]).trim() : '';
    const matchUnit = filterUnit ? (unitVal === filterUnit) : true;
    
    const contentType = row[4] || '';
    const axisVal = contentType === 'Servo Parameter' ? (row[6] ? String(row[6]).trim() : '') : '';
    const partVal = contentType === 'Servo Parameter' ? (row[5] || '') : (row[5] || '');
    
    const matchAxis = filterAxis ? (axisVal === filterAxis) : true;
    const matchPart = filterPart ? (String(partVal).toLowerCase().includes(filterPart)) : true;
    
    return matchLine && matchUnit && matchAxis && matchPart;
  });

  if (filteredData.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:20px; color:#aaa;">조건에 일치하는 이력이 없습니다.</td></tr>';
    return;
  }

  filteredData.slice().reverse().forEach(row => {
    const tr = document.createElement('tr');
    
    const lineData = row[1] || '';        
    const unitData = row[2] || '';        
    const workerData = row[3] || '';      
    const contentType = row[4] || '';     
    
    const colF = row[5] || '';            
    const colG = row[6] || '';            
    const colH = row[7] || '';            
    const colI = row[8] || '';            
    const colJ = row[9] || '';            

    let personDisplay = workerData;
    if (workerData.includes(" - 요청: ")) {
      const parts = workerData.split(" - 요청: ");
      personDisplay = `<strong>${parts[0]}</strong><br><span style="font-size:11px; color:#64748b;">요청: ${parts[1]}</span>`;
    }

    let displayAxis = "-";
    let displayPart = "";

    if (contentType === 'Servo Parameter') {
      displayAxis = `<strong style="color:#2c3e50;">${colG}</strong>`;
      displayPart = `<span style="font-weight:500;">${colF}</span><br><span style="font-size:11px; color:#64748b;">${colH}</span>`;
    } else if (contentType === 'Temperature') {
      displayPart = `<span style="color:#e11d48; font-weight:bold;">Temperature (온도)</span>`;
    } else if (contentType === 'Normal Parameter') {
      displayPart = `<span style="color:#2563eb; font-weight:bold;">${colF}</span>`;
    } else {
      displayPart = colF;
    }

    tr.innerHTML = `
      <td>${lineData}</td>
      <td><strong>${unitData}</strong></td>
      <td>${personDisplay}</td>
      <td><span style="font-size:11px; padding:2px 5px; background:#f1f5f9; border-radius:4px; color:#475569;">${contentType.replace(" Parameter","")}</span></td>
      <td style="text-align:center;">${displayAxis}</td>
      <td>${displayPart}</td>
      <td style="color:#16a34a; font-weight:bold;">${colI}</td>
      <td style="color:#334155; font-size:12px;">${colJ}</td>
    `;
    tbody.appendChild(tr);
  });
}

  // 🛠️ 유닛 규칙성 검증 및 체크박스 가시성 컨트롤 제어 함수
  function checkCommonApplyVisibility() {
    const unit = document.getElementById('unit').value;
    const wrapper = document.getElementById('common-apply-wrapper');
    const chk = document.getElementById('common-apply');

    // 쌍이 존재하는 유닛들만 체크박스 활성화
    const pairableUnits = [
      "Heat Press3A(270 Folding 전)", "Heat Press3B(270 Folding 전)",
      "270 Folding A", "270 Folding B",
      "Side Press A", "Side Press B",
      "Taping Unit A", "Taping Unit B"
    ];

    if (pairableUnits.includes(unit)) {
      wrapper.style.display = "flex";
    } else {
      wrapper.style.display = "none";
      chk.checked = false; // 다른 유닛 선택 시 오작동 방지용 리셋
    }
  }

  // 🛠️ 카운터파트 유닛 명 매칭 연산 알고리즘 함수
  function getCounterpartUnit(currentUnit) {
    const mapping = {
      "Heat Press3A(270 Folding 전)": "Heat Press3B(270 Folding 전)",
      "Heat Press3B(270 Folding 전)": "Heat Press3A(270 Folding 전)",
      "270 Folding A": "270 Folding B",
      "270 Folding B": "270 Folding A",
      "Side Press A": "Side Press B",
      "Side Press B": "Side Press A",
      "Taping Unit A": "Taping Unit B",
      "Taping Unit B": "Taping Unit A"
    };
    return mapping[currentUnit] || null;
  }

  function handleUnitChange() {
    const unit = document.getElementById('unit').value;
    const descSelect = document.getElementById('servo-desc-select');
    const descInput = document.getElementById('servo-desc-input');

    // Taping Unit A 혹은 B 분기 처리 대응
    if (unit.startsWith('Taping Unit')) {
      updatePartOptions(tapingParts);
      descSelect.style.display = 'none';
      descInput.style.display = 'block';
    } else {
      updatePartOptions(defaultParts);
      descSelect.style.display = 'block';
      descInput.style.display = 'none';
    }

    checkCommonApplyVisibility();
  }

  function updatePartOptions(optionsArray) {
    const partSelect = document.getElementById('servo-part');
    if(!partSelect) return;
    partSelect.innerHTML = '<option value="">-- 선택 / Select --</option>';
    optionsArray.forEach(opt => {
      const option = document.createElement('option');
      option.value = opt.value;
      option.textContent = opt.text;
      partSelect.appendChild(option);
    });
  }

  function toggleSubFields() {
    const contentType = document.getElementById('contentType').value;
    
    document.getElementById('sec-temperature').style.display = 'none';
    document.getElementById('sec-servo').style.display = 'none';
    document.getElementById('sec-normal').style.display = 'none';

    if (contentType === 'Temperature') {
      document.getElementById('sec-temperature').style.display = 'block';
    } else if (contentType === 'Servo Parameter') {
      document.getElementById('sec-servo').style.display = 'block';
    } else if (contentType === 'Normal Parameter') {
      document.getElementById('sec-normal').style.display = 'block';
    }
  }

  function fallbackCopyText(text) {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    textArea.style.position = "fixed";  
    textArea.style.left = "-999999px";
    textArea.style.top = "-999999px";
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();
    try {
      document.execCommand('copy');
    } catch (err) {
      console.error('Fallback copy failed', err);
    }
    document.body.removeChild(textArea);
  }

  async function submitData() {
    const statusDiv = document.getElementById('status');
    
    const line = document.getElementById('line').value;
    const unit = document.getElementById('unit').value;
    const worker = document.getElementById('worker').value.trim();
    const requester = document.getElementById('requester').value.trim();
    const contentType = document.getElementById('contentType').value;
    const isCommonApply = document.getElementById('common-apply').checked;

    if (!line || !unit || !worker || !contentType) {
      alert("공통 필수 항목(라인, 유닛, 변경자, 변경내용)을 모두 입력해주세요.");
      return;
    }

    const combinedWorker = requester ? `${worker} - 요청: ${requester}` : worker;

    let sub1 = "", sub2 = "", sub3 = "", sub4 = "", sub5 = "";
    
    // 🛠️ 클립보드 문자열 조립 최적화 빌더
    let clipboardText = `[EOL Folding Parameter 변경 공유]\n• 라인(Line): ${line}\n`;
    
    if (isCommonApply && getCounterpartUnit(unit)) {
      const counterUnit = getCounterpartUnit(unit);
      clipboardText += `• 유닛(Unit): ${unit} & ${counterUnit} (★A/B 공통 적용)\n`;
    } else {
      clipboardText += `• 유닛(Unit): ${unit}\n`;
    }
    
    clipboardText += `• 변경자(Worker): ${worker}\n`;
    if(requester) {
      clipboardText += `• 요청자(Requester): ${requester}\n`;
    }
    clipboardText += `• 변경유형(Type): ${contentType}\n`;

    if (contentType === 'Temperature') {
      sub1 = "Temperature";
      sub2 = document.getElementById('temp-val').value;
      sub3 = document.getElementById('temp-reason').value;
      if(!sub2 || !sub3) { alert("세부 항목을 모두 입력해주세요."); return; }
      clipboardText += `• 온도(Temp): ${sub2}\n• 변경 사유(Reason): ${sub3}`;
    } 
    else if (contentType === 'Servo Parameter') {
      sub1 = document.getElementById('servo-type').value;
      sub2 = document.getElementById('servo-axis').value;
      const partVal = document.getElementById('servo-part').value;
      
      let descVal = "";
      if (unit.startsWith('Taping Unit')) {
        descVal = document.getElementById('servo-desc-input').value;
      } else {
        descVal = document.getElementById('servo-desc-select').value;
      }
      
      sub4 = document.getElementById('servo-val').value;
      sub5 = document.getElementById('servo-reason').value;

      if(!sub1 || !sub2 || !partVal || !descVal || !sub4 || !sub5) { 
        alert("세부 항목을 모두 완성해주세요."); 
        return; 
      }

      sub3 = `${partVal} - ${descVal}`;
      clipboardText += `• 구분(Type): ${sub1}\n• 축(Axis): ${sub2}\n• Part 정보: ${sub3}\n• 변경 값(Value): ${sub4}\n• 변경 사유(Reason): ${sub5}`;
    } 
    else if (contentType === 'Normal Parameter') {
      sub1 = document.getElementById('normal-type').value;
      sub2 = document.getElementById('normal-val').value;
      sub3 = document.getElementById('normal-reason').value;
      if(!sub1 || !sub2 || !sub3) { alert("세부 항목을 모두 입력해주세요."); return; }
      clipboardText += `• 타입(Type): ${sub1}\n• 변경 값(Value): ${sub2}\n• 변경 사유(Reason): ${sub3}`;
    }

    statusDiv.style.color = "orange";
    statusDiv.innerText = "⏳ 데이터 전송 중... (Sending data...)";

    // 🛠️ 전송 데이터 배열 빌드 작업 (공통 적용 플래그 계산기)
    const payloads = [];
    
    // 기본 선택 유닛 데이터 구성
    payloads.push({
      line: line,
      unit: unit,
      worker: combinedWorker, 
      contentType: contentType,
      sub1: sub1,
      sub2: sub2,
      sub3: sub3, 
      sub4: sub4,
      sub5: sub5
    });

    // 만약 A/B 공통 적용 체크가 되어있다면 카운터파트 유닛 로우 추가 생성
    if (isCommonApply && getCounterpartUnit(unit)) {
      payloads.push({
        line: line,
        unit: getCounterpartUnit(unit),
        worker: combinedWorker, 
        contentType: contentType,
        sub1: sub1,
        sub2: sub2,
        sub3: sub3, 
        sub4: sub4,
        sub5: sub5
      });
    }

    // 클립보드 복사 실행
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(clipboardText).catch(() => fallbackCopyText(clipboardText));
    } else {
      fallbackCopyText(clipboardText);
    }

    try {
      // 🛠️ 구성된 페이로드를 순차적으로 모두 비동기 POST 전송
      for (const p of payloads) {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(p)
        });
      }

      statusDiv.style.color = "green";
      statusDiv.innerText = payloads.length > 1 
        ? "✅ [공통적용 2건] 업로드 및 클립보드 복사 완료! 메신저창에 붙여넣기 하세요."
        : "✅ 업로드 및 클립보드 복사 완료! 메신저창에 붙여넣기 하세요.";

      // 입력란 초기화 및 클렌징 작업
      document.getElementById('worker').value = '';
      document.getElementById('requester').value = '';
      document.getElementById('contentType').value = '';
      document.getElementById('unit').value = '';
      document.getElementById('common-apply').checked = false;
      if(document.getElementById('servo-desc-input')) document.getElementById('servo-desc-input').value = '';
      
      updatePartOptions(defaultParts);
      toggleSubFields();
      checkCommonApplyVisibility();

    } catch (error) {
      console.error(error);
      statusDiv.style.color = "red";
      statusDiv.innerText = "❌ 전송 오류가 발생했으나 클립보드는 복사되었습니다.";
    }
  }
</script>
