<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EOL Folding Parameter Management</title>
  <style>
    body {
      font-family: 'Malgun Gothic', 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      color: #333;
    }
    .container {
      max-width: 550px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 2px solid #4a4a4a;
    }
    .header h1 {
      font-size: 22px;
      color: #2c3e50;
      margin: 0 0 5px 0;
    }
    .header p {
      font-size: 13px;
      color: #7f8c8d;
      margin: 0;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .sub-section {
      background-color: #fcfcfc;
      border: 1px dashed #cbd5e1;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none; /* Hidden by default / 초기 숨김 */
    }
    .sub-section h3 {
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 15px;
      color: #475569;
      border-left: 4px solid #4a4a4a;
      padding-left: 8px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #34495e;
      font-size: 14px;
    }
    select, input[type="text"], textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
      background-color: #fff;
      font-family: inherit;
    }
    select:focus, input:focus, textarea:focus {
      border-color: #3498db;
      outline: none;
      box-shadow: 0 0 4px rgba(52,152,219,0.3);
    }
    textarea {
      height: 80px;
      resize: vertical;
    }
    .button {
      width: 100%;
      padding: 14px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 15px;
      transition: background-color 0.2s;
    }
    .button:hover {
      background-color: #218838;
    }
    .status-msg {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
      color: #4a4a4a;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📋 EOL Folding Parameter 관리<br><span style="font-size:16px; color:#555;">(Parameter Management System)</span></h1>
    <p>Folding 공정 파라미터 변경 이력 시스템 / Change History System</p>
  </div>

  <div class="form-group">
    <label for="line">1. 라인 (Line)</label>
    <select id="line">
      <option value="">-- 라인을 선택하세요 / Select Line --</option>
    </select>
  </div>

  <div class="form-group">
    <label for="unit">2. 유닛 (Unit)</label>
    <select id="unit">
      <option value="">-- 유닛을 선택하세요 / Select Unit --</option>
      <!-- 💡 셋업 요청 반영: 신규 유닛 선택지 2종 추가 -->
      <option value="Pouch Cutter">Pouch Cutter</option>
      <option value="Heat Press1(Cutter 전)">Heat Press1(Cutter 전)</option>
      <option value="Heat Press2(90 Folding 전)">Heat Press2(90 Folding 전)</option>
      <option value="90 Folding">90 Folding</option>
      <option value="180 Folding">180 Folding</option>
      <option value="Heat Press3A(270 Folding 전)">Heat Press3A(270 Folding 전)</option>
      <option value="Heat Press3B(270 Folding 전)">Heat Press3B(270 Folding 전)</option>
      <option value="270 Folding A">270 Folding A</option>
      <option value="270 Folding B">270 Folding B</option>
      <option value="Side Press">Side Press</option>
    </select>
  </div>

  <div class="form-group">
    <label for="worker">3. 변경자 (Worker)</label>
    <input type="text" id="worker" placeholder="이름을 입력하세요 / Enter worker's name" />
  </div>

  <div class="form-group">
    <label for="contentType">4. 변경 내용 (Content Type)</label>
    <select id="contentType" onchange="toggleSubFields()">
      <option value="">-- 유형을 선택하세요 / Select Type --</option>
      <option value="Temperature">Temperature (온도)</option>
      <option value="Servo Parameter">Servo Parameter (서보 파라미터)</option>
      <option value="Normal Parameter">Normal Parameter (일반 파라미터)</option>
    </select>
  </div>

  <!-- Temperature Section -->
  <div id="sec-temperature" class="sub-section">
    <h3>🌡️ Temperature 세부 정보 (Details)</h3>
    <div class="form-group">
      <label for="temp-val">변경내용1 - 온도 (Value - Temperature)</label>
      <input type="text" id="temp-val" placeholder="설정 온도를 입력하세요 / Enter temperature value" />
    </div>
    <div class="form-group">
      <label for="temp-reason">변경내용2 - 변경 사유 (Reason for Change)</label>
      <textarea id="temp-reason" placeholder="변경 사유를 입력하세요 / Enter reason for change"></textarea>
    </div>
  </div>

  <!-- Servo Parameter Section -->
  <div id="sec-servo" class="sub-section">
    <h3>⚙️ Servo Parameter 세부 정보 (Details)</h3>
    <div class="form-group">
      <label for="servo-type">변경내용 1 - 속도/위치 구분 (Speed / Position)</label>
      <select id="servo-type">
        <option value="">-- 선택 / Select --</option>
        <option value="속도">속도 (Speed)</option>
        <option value="위치">위치 (Position)</option>
      </select>
    </div>
    <div class="form-group">
      <label for="servo-axis">변경내용 2 - 축 정보 (Axis Information)</label>
      <select id="servo-axis">
        <option value="">-- 선택 / Select --</option>
        <option value="X">X</option>
        <option value="Y">Y</option>
        <option value="Z">Z</option>
      </select>
    </div>
    <div class="form-group">
      <label for="servo-part">변경내용 3 - Part 정보 (Part Details)</label>
      <select id="servo-part">
        <option value="">-- 선택 / Select --</option>
        <option value="상도">상도 (Upper Mold)</option>
        <option value="하도">하도 (Lower Mold)</option>
        <option value="펀치">펀치 (Punch)</option>
        <option value="유닛 전체(얼라인)">유닛 전체/얼라인 (Total Unit / Align)</option>
      </select>
    </div>
    
    <div class="form-group">
      <label for="servo-desc">변경내용 3 sub - 파라 설명 (Parameter Description)</label>
      <select id="servo-desc">
        <option value="">-- 선택 / Select --</option>
        <!-- 💡 셋업 요청 반영: 대기 위치 선택지 추가 -->
        <option value="대기 위치">대기 위치 (Wait Position)</option>
        <option value="상승 위치">상승 위치 (Up Position)</option>
        <option value="하강 위치">하강 위치 (Down Position)</option>
        <option value="상승 속도">상승 속도 (Up Speed)</option>
        <option value="하강 속도">하강 속도 (Down Speed)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="servo-val">변경내용 4 - 변경 값 (Change Value)</label>
      <input type="text" id="servo-val" placeholder="변경 수치를 입력하세요 / Enter change value" />
    </div>
    <div class="form-group">
      <label for="servo-reason">변경내용 5 - 변경 사유 (Reason for Change)</label>
      <textarea id="servo-reason" placeholder="변경 사유를 입력하세요 / Enter reason for change"></textarea>
    </div>
  </div>

  <!-- Normal Parameter Section -->
  <div id="sec-normal" class="sub-section">
    <h3>📄 Normal Parameter 세부 정보 (Details)</h3>
    <div class="form-group">
      <label for="normal-type">변경내용1 - 타입 (Parameter Type)</label>
      <select id="normal-type">
        <option value="">-- 선택 / Select --</option>
        <option value="펀치 유지 시간">펀치 유지 시간 (Punch Dwell Time)</option>
        <option value="press 유지시간">press 유지시간 (Press Holding Time)</option>
      </select>
    </div>
    <div class="form-group">
      <label for="normal-val">변경내용2 - 변경 값 (Change Value)</label>
      <input type="text" id="normal-val" placeholder="변경 값을 입력하세요 / Enter change value" />
    </div>
    <div class="form-group">
      <label for="normal-reason">변경내용3 - 변경 사유 (Reason for Change)</label>
      <textarea id="normal-reason" placeholder="변경 사유를 입력하세요 / Enter reason for change"></textarea>
    </div>
  </div>

  <button class="button" onclick="submitData()">업로드 + 자동 클립보드 복사 (Upload & Copy)</button>
  <div id="status" class="status-msg"></div>
</div>

<script>
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxRZWg48i9vOWYuWjJo3o9fu_-vn6XmK9EyTBSr0nkIXK7_Bl4GyExtys4uES4LSSBq/exec";

  window.addEventListener('load', () => {
    const lineSelect = document.getElementById('line');
    for (let i = 1; i <= 6; i++) {
      for (let j = 1; j <= 2; j++) {
        const val = `${i}-${j}`;
        const option = document.createElement('option');
        option.value = val;
        option.textContent = val;
        lineSelect.appendChild(option);
      }
    }
  });

  function toggleSubFields() {
    const contentType = document.getElementById('contentType').value;
    
    document.getElementById('sec-temperature').style.display = 'none';
    document.getElementById('sec-servo').style.display = 'none';
    document.getElementById('sec-normal').style.display = 'none';

    if (contentType === 'Temperature') {
      document.getElementById('sec-temperature').style.display = 'block';
    } else if (contentType === 'Servo Parameter') {
      document.getElementById('sec-servo').style.display = 'block';
    } else if (contentType === 'Normal Parameter') {
      document.getElementById('sec-normal').style.display = 'block';
    }
  }

  function fallbackCopyText(text) {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    textArea.style.position = "fixed";  
    textArea.style.left = "-999999px";
    textArea.style.top = "-999999px";
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();
    try {
      document.execCommand('copy');
    } catch (err) {
      console.error('Fallback copy failed / 복사 실패', err);
    }
    document.body.removeChild(textArea);
  }

  async function submitData() {
    const statusDiv = document.getElementById('status');
    
    const line = document.getElementById('line').value;
    const unit = document.getElementById('unit').value;
    const worker = document.getElementById('worker').value;
    const contentType = document.getElementById('contentType').value;

    if (!line || !unit || !worker || !contentType) {
      alert("공통 필수 항목을 모두 입력해주세요.\n(Please fill out all common required fields.)");
      return;
    }

    let sub1 = "", sub2 = "", sub3 = "", sub4 = "", sub5 = "";
    let clipboardText = `[EOL Folding Parameter 변경 공유 / Parameter Change Share]\n• 라인(Line): ${line}\n• 유닛(Unit): ${unit}\n• 변경자(Worker): ${worker}\n• 변경유형(Type): ${contentType}\n`;

    if (contentType === 'Temperature') {
      sub1 = document.getElementById('temp-val').value;
      sub2 = document.getElementById('temp-reason').value;
      if(!sub1 || !sub2) { alert("세부 항목을 모두 입력해주세요. (Please fill out all details.)"); return; }
      clipboardText += `• 온도(Temp): ${sub1}\n• 변경 사유(Reason): ${sub2}`;
    } 
    else if (contentType === 'Servo Parameter') {
      sub1 = document.getElementById('servo-type').value;
      sub2 = document.getElementById('servo-axis').value;
      const partVal = document.getElementById('servo-part').value;
      const descVal = document.getElementById('servo-desc').value;
      sub4 = document.getElementById('servo-val').value;
      sub5 = document.getElementById('servo-reason').value;

      if(!sub1 || !sub2 || !partVal || !descVal || !sub4 || !sub5) { 
        alert("세부 항목을 모두 완성해주세요. (Please fill out all details.)"); 
        return; 
      }

      // 'Part 정보 - 파라 설명' 형태로 결합 처리
      sub3 = `${partVal} - ${descVal}`;
      clipboardText += `• 구분(Type): ${sub1}\n• 축(Axis): ${sub2}\n• Part 정보: ${sub3}\n• 변경 값(Value): ${sub4}\n• 변경 사유(Reason): ${sub5}`;
    } 
    else if (contentType === 'Normal Parameter') {
      sub1 = document.getElementById('normal-type').value;
      sub2 = document.getElementById('normal-val').value;
      sub3 = document.getElementById('normal-reason').value;
      if(!sub1 || !sub2 || !sub3) { alert("세부 항목을 모두 입력해주세요. (Please fill out all details.)"); return; }
      clipboardText += `• 타입(Type): ${sub1}\n• 변경 값(Value): ${sub2}\n• 변경 사유(Reason): ${sub3}`;
    }

    statusDiv.style.color = "orange";
    statusDiv.innerText = "⏳ 데이터 전송 중... (Sending data...)";

    const payload = {
      line: line,
      unit: unit,
      worker: worker,
      contentType: contentType,
      sub1: sub1,
      sub2: sub2,
      sub3: sub3, 
      sub4: sub4,
      sub5: sub5
    };

    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(clipboardText).catch(() => fallbackCopyText(clipboardText));
    } else {
      fallbackCopyText(clipboardText);
    }

    try {
      await fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });

      statusDiv.style.color = "green";
      statusDiv.innerText = "✅ 업로드 및 클립보드 복사 완료! 메신저창에 붙여넣기 하세요.\n(Upload & Copy Complete! Paste it into the chat.)";

      document.getElementById('worker').value = '';
      document.getElementById('contentType').value = '';
      toggleSubFields();

    } catch (error) {
      console.error(error);
      statusDiv.style.color = "red";
      statusDiv.innerText = "❌ 전송 오류가 발생했으나 클립보드는 복사되었습니다.\n(Error occurred but text is copied to clipboard.)";
    }
  }
</script>
</body>
</html>
