<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EOL Folding Parameter 관리</title>
  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      color: #333;
    }
    .container {
      max-width: 550px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 2px solid #4a4a4a;
    }
    .header h1 {
      font-size: 24px;
      color: #2c3e50;
      margin: 0 0 5px 0;
    }
    .header p {
      font-size: 14px;
      color: #7f8c8d;
      margin: 0;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .sub-section {
      background-color: #fcfcfc;
      border: 1px dashed #cbd5e1;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    .sub-section h3 {
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 16px;
      color: #475569;
      border-left: 4px solid #4a4a4a;
      padding-left: 8px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #34495e;
    }
    select, input[type="text"], textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      box-sizing: border-box;
      background-color: #fff;
      font-family: inherit;
    }
    select:focus, input:focus, textarea:focus {
      border-color: #3498db;
      outline: none;
      box-shadow: 0 0 4px rgba(52,152,219,0.3);
    }
    textarea {
      height: 80px;
      resize: vertical;
    }
    .button {
      width: 100%;
      padding: 14px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 15px;
      transition: background-color 0.2s;
    }
    .button:hover {
      background-color: #218838;
    }
    .status-msg {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
      color: #4a4a4a;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📋 EOL Folding Parameter 관리</h1>
    <p>Folding 공정 파라미터 변경 이력 시스템</p>
  </div>

  <div class="form-group">
    <label for="line">1. 라인 (Line)</label>
    <select id="line">
      <option value="">-- 라인을 선택하세요 --</option>
    </select>
  </div>

  <div class="form-group">
    <label for="unit">2. 유닛 (Unit)</label>
    <select id="unit">
      <option value="">-- 유닛을 선택하세요 --</option>

      <option value="90 Folding">90 Folding</option>
      <option value="180 Folding">180 Folding</option>
      <option value="Heat Press3A(270 Folding 전)">Heat Press3A(270 Folding 전)</option>
      <option value="Heat Press3B(270 Folding 전)">Heat Press3B(270 Folding 전)</option>
